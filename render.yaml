services:
  - type: web
    name: imagify-api
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    # Render automatically assigns $PORT, your app should listen on 0.0.0.0
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: imagify-env
      - key: PYTHON_VERSION
        value: 3.12.1

  - type: worker
    name: imagify-worker
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: celery -A app.core.celery_app worker --loglevel=info
    envVars:
      - fromGroup: imagify-env
      - key: PYTHON_VERSION
        value: 3.12.1

  # Dedicated beat scheduler. Must be a single instance (Render's "worker"
  # type runs one container) so we never enqueue scheduled jobs more than
  # once. Drives the daily ImageKit cleanup tick.
  - type: worker
    name: imagify-beat
    env: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: celery -A app.core.celery_app beat --loglevel=info
    envVars:
      - fromGroup: imagify-env
      - key: PYTHON_VERSION
        value: 3.12.1

envGroups:
  - name: imagify-env
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      # Strict CORS allowlist — startup refuses '*' in production. Replace
      # with your real client origins (mobile dev tunnel, web app, etc).
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_CREDENTIALS
        value: "true"
